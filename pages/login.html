<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - CookieRun Kingdom</title>
  <link rel="icon" type="image/ico" href="../assets/images/icones/app_logo_5_ans.ico">
  <link rel="stylesheet" href="../assets/css/login.css">
  <link rel="stylesheet" href="../assets/css/buttons.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="../assets/images/logo/logo_connexion.webp" alt="CookieRun Kingdom" class="login-logo">
        <h1>Connexion</h1>
      </div>
      
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" name="email" required placeholder="Entrez votre e-mail">
        </div>
        
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required placeholder="Entrez votre mot de passe">
        </div>
        
        <div class="form-error" id="error-message"></div>
        
        <button type="submit" class="btn btn-login">
          <span>Se connecter</span>
        </button>
      </form>
      
      <div class="login-footer">
        <p>Pas encore de compte ? <a href="#" id="register-link">S'inscrire</a></p>
      </div>
    </div>
  </div>
  
  <script type="module">
    import { login, isLoggedIn, register } from '../assets/js/login_supabase.js';
    document.addEventListener('DOMContentLoaded', async () => {
      // Redirige si déjà connecté
      if (await isLoggedIn()) {
        window.location.href = '../index.html';
        return;
      }
      const loginForm = document.getElementById('login-form');
      const errorMessage = document.getElementById('error-message');
      const registerLink = document.getElementById('register-link');
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const result = await login(email, password);
        if (result.success) {
          window.location.href = '../index.html';
        } else {
          errorMessage.textContent = result.error;
          loginForm.style.animation = 'shake 0.5s';
          setTimeout(() => { loginForm.style.animation = ''; }, 500);
        }
      });
      registerLink.addEventListener('click', async (e) => {
        e.preventDefault();
        const email = prompt('Votre e-mail :');
        if (!email) return;
        const password = prompt('Choisissez un mot de passe (min 6 caractères) :');
        if (!password) return;
        const result = await register(email, password);
        if (result.success) {
          alert('Inscription réussie ! Vous pouvez vous connecter.');
        } else {
          errorMessage.textContent = result.error;
        }
      });
    });
  </script>
</body>
</html>
