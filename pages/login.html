<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - CookieRun Kingdom</title>
  <link rel="icon" type="image/ico"
    href="https://res.cloudinary.com/dkgfa4apm/image/upload/v1769033978/app_logo_hvgvkz.ico">
  <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="https://res.cloudinary.com/dkgfa4apm/image/upload/v1773244370/logo_patch_7_2_sswoae.webp"
          alt="CookieRun Kingdom" class="login-logo">
        <h1>Se connecter</h1>
      </div>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <input type="email" id="email" name="email" required placeholder="Adresse e-mail">
        </div>

        <div class="form-group">
          <input type="password" id="password" name="password" required placeholder="Mot de passe">
        </div>

        <div class="form-error" id="error-message"></div>

        <button type="submit" class="login-submit-btn">
          <img src="https://res.cloudinary.com/dkgfa4apm/image/upload/v1773164563/connexion_p2ilhv.webp"
            alt="Connexion">
        </button>
      </form>

      <div class="login-footer">
        <p>Pas encore de compte ? <a href="#" id="register-link">S'inscrire</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { login, isLoggedIn, register } from '../assets/js/login_supabase.js';
    document.addEventListener('DOMContentLoaded', async () => {
      // Redirige si déjà connecté
      if (await isLoggedIn()) {
        window.location.href = '../index.html';
        return;
      }
      const loginForm = document.getElementById('login-form');
      const errorMessage = document.getElementById('error-message');
      const registerLink = document.getElementById('register-link');
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const result = await login(email, password);
        if (result.success) {
          window.location.href = '../index.html';
        } else {
          errorMessage.textContent = result.error;
          loginForm.style.animation = 'shake 0.5s';
          setTimeout(() => { loginForm.style.animation = ''; }, 500);
        }
      });
      registerLink.addEventListener('click', async (e) => {
        e.preventDefault();
        const email = prompt('Votre e-mail :');
        if (!email) return;
        const password = prompt('Choisissez un mot de passe (min 6 caractères) :');
        if (!password) return;
        const result = await register(email, password);
        if (result.success) {
          alert('Inscription réussie ! Vous pouvez vous connecter.');
        } else {
          errorMessage.textContent = result.error;
        }
      });
    });
  </script>
</body>

</html>
