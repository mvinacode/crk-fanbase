name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: |
          node node_modules/vite/bin/vite.js build
          # Manually copy static assets that Vite misses (referenced dynamically in JS/CSS)
          cp -r includes dist/
          mkdir -p dist/assets/css
          cp -r assets/css/* dist/assets/css/
          mkdir -p dist/assets/data
          cp -r assets/data/* dist/assets/data/
          mkdir -p dist/assets/fonts
          cp -r assets/fonts/* dist/assets/fonts/
          mkdir -p dist/assets/images
          cp -r assets/images/* dist/assets/images/
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
